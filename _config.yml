title: "Tech Security Blog"
subtitle: "Security Educational Articles"
name: "Mahmoud Jadaan"
description: "Articles on Linux, Cryptography, Network Protocols, and Hardware security — all for educational purposes."
url: "https://masjadaan.github.io"
baseurl: "/techblog"
repository: "masjadaan/techblog"

remote_theme: mmistakes/minimal-mistakes@4.26.2
minimal_mistakes_skin: "dark"

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap

author:
  name: "Mahmoud Jadaan"
  bio: "Security Researcher"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/masjadaan"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/mahmoud-jadaan/"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/masjadaan"

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"

defaults:
  - scope:
      path: ""
    values:
      layout: "single"
      classes: wide
      author_profile: true
      toc: true
      toc_sticky: true
      read_time: true
      show_date: true

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - "*.sh"
  - "*.c"
  - "*.py"
  - LICENSE
